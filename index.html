<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnostic Pipeline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" defer></script>
    <script src="/main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>

<body data-bs-theme="dark">
    <div style="display: flex; margin: 25px; height: calc(100vh - 50px); width: calc(100vw - 50px); overflow: hidden;">
        <div id="left_menu" class="d-flex flex-column"
            style="padding: 25px; flex: 0 0 350px; border: 1px solid #ccc; border-radius: 15px; height: 100%; margin-right: 25px; background-color: var(--bs-tertiary-bg); overflow: hidden;">
            <h2>Diagnostic Pipeline</h2>
            <div id="patient_list" class="list-group d-flex flex-column flex-grow-1" style="margin-top: 25px;">
                <h4>Patients</h4>
                <select id="patient_select" class="form-select" style="margin-top: 15px;">
                    <option value="" disabled selected>Select a patient</option>
                </select>

                <h4 style="margin-top: 15px;">Patient Stays</h4>
                <select id="stay_select" class="form-select" style="margin-top: 15px;">
                    <option value="" selected>All</option>
                </select>

                <h4 style="margin-top: 15px;">Presenting Complaint</h4>
                <textarea id="presenting_complaint" class="form-control" rows="5"
                    placeholder="Enter presenting complaints" style="margin-top: 15px; resize: none;"></textarea>
                <button id="run_pipeline_button" class="btn btn-primary mt-auto">Run Diagnostic Pipeline</button>
            </div>
        </div>
        <div id="main_content"
            style="padding: 25px; flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; border: 1px solid #ccc; border-radius: 15px; height: 100%; margin-right: 25px; background-color: var(--bs-tertiary-bg); overflow: hidden;">
            <h2>Patient Data</h2>
            <div id="patient_data" style="display: flex; gap: 15px; width: 100%; flex: 1 1 auto; flex-wrap: nowrap; align-items: stretch; min-height: 0; overflow: hidden;">
                <div id="patient_summary" style="flex: 1 1 0; min-width: 0; border: 1px solid #ccc; border-radius: 12px; padding: 15px; min-height: 0; height: 100%; overflow-y: auto;">
                    <!-- Patient summary will be displayed here -->
                </div>
                <div id="patient_timeline_summary" style="flex: 1 1 0; min-width: 0; border: 1px solid #ccc; border-radius: 12px; padding: 15px; min-height: 0; height: 100%; overflow-y: auto;">
                    <!-- Patient timeline summary will be displayed here -->
                </div>
                <div id="patient_diagnoses" style="flex: 1 1 0; min-width: 0; border: 1px solid #ccc; border-radius: 12px; padding: 15px; min-height: 0; height: 100%; overflow-y: auto;">
                    <!-- Patient diagnoses will be displayed here -->
                </div>
            </div>
        </div>
        <div id="right_menu"
            style="padding: 25px; flex: 0 0 450px; border: 1px solid #ccc; border-radius: 15px; height: 100%; background-color: var(--bs-tertiary-bg); overflow: hidden;">
            <h2>Agent Actions</h2>
            <div id="agent_actions" style="height: calc(100% - 48px); overflow-y: auto;">
                <table class="table table-sm table-dark table-striped align-middle mb-0">
                    <thead style="position: sticky; top: 0;">
                        <tr>
                            <th scope="col">Agent</th>
                            <th scope="col">Action</th>
                            <th scope="col">Status</th>
                        </tr>
                    </thead>
                    <tbody id="agent_actions_body"></tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
